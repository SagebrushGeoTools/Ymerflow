server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy (must come before /api/ since /ws/ is not under /api/)
    location /ws/ {
        proxy_pass http://backend-service:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # REST API proxy: strip /api prefix before forwarding to backend
    location /api/ {
        proxy_pass http://backend-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 500m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # pgAdmin — proxied at /pgadmin/ with basic auth
    # proxy_pass trailing slash strips the /pgadmin prefix before forwarding,
    # so pgAdmin receives plain paths (/login, /static/…).
    # X-Script-Name tells pgAdmin's middleware to prepend /pgadmin to all
    # generated URLs so links and redirects stay under /pgadmin/.
    # proxy_hide_header WWW-Authenticate prevents pgAdmin's own 401 responses
    # from triggering the browser's basic-auth dialog on top of nginx's auth.
    location /pgadmin/ {
        auth_basic "Nagelfluh Admin";
        auth_basic_user_file /etc/nginx/htpasswd/admin.htpasswd;
        proxy_pass http://pgadmin.nagelfluh.svc.cluster.local:80/;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header WWW-Authenticate;
        proxy_read_timeout 300s;
    }

    # Headlamp (Kubernetes dashboard) — proxied at /headlamp/ with basic auth
    # Headlamp is started with --base-url /headlamp so it generates correct URLs;
    # WebSocket upgrade headers are included for live resource updates.
    # 30-headlamp-token.sh (run at container start) writes /tmp/headlamp-token.conf
    # with a proxy_set_header directive that injects the SA token so Headlamp
    # auto-authenticates without requiring a manual token paste.
    # proxy_hide_header WWW-Authenticate prevents Headlamp's own 401 responses
    # from triggering the browser's basic-auth dialog on top of nginx's auth.
    location /headlamp/ {
        auth_basic "Nagelfluh Admin";
        auth_basic_user_file /etc/nginx/htpasswd/admin.htpasswd;
        include /tmp/headlamp-token.conf;
        proxy_pass http://headlamp.headlamp.svc.cluster.local:4466;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header WWW-Authenticate;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # SPA routing: serve index.html for all React routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
