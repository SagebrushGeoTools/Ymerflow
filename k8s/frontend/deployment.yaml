# MANUAL / OPT-OUT PATH ONLY — see the header on k8s/backend/deployment.yaml. For the default
# same-as-backend/minikube cluster type the frontend Deployment is applied by nagelfluh-deploy-app
# (apply_app_workloads); this manifest is retained for cluster types without
# supports_app_deployment (docs/plans/app-deployment-hooks.md, Design decision 7).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nagelfluh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nagelfluh-frontend:prod
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        volumeMounts:
        - name: admin-htpasswd
          mountPath: /etc/nginx/htpasswd
          readOnly: true
        - name: headlamp-token
          mountPath: /etc/nginx/headlamp-token
          readOnly: true
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: admin-htpasswd
        secret:
          secretName: nagelfluh-admin-secret
          items:
          - key: htpasswd
            path: admin.htpasswd
      - name: headlamp-token
        secret:
          secretName: headlamp-nginx-token
          optional: true
