apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: nagelfluh
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: backend
---
# ExternalName so process jobs in nagelfluh-jobs can reach the backend
# (job_orchestrator.py hardcodes http://backend-service:8000 as BACKEND_URL)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: nagelfluh-jobs
spec:
  type: ExternalName
  externalName: backend-service.nagelfluh.svc.cluster.local
  ports:
  - port: 8000
    name: http
