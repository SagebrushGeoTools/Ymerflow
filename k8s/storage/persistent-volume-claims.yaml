# The MinIO PVC moved into plugins/ymerflow-minikube's own MinioProtocolHandler.bootstrap() (see
# docs/plans/minikube-provisioning-plugin.md) — Postgres is the only thing left here.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-postgres-0
  namespace: nagelfluh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ""
  volumeName: nagelfluh-postgres
