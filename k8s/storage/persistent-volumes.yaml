apiVersion: v1
kind: PersistentVolume
metadata:
  name: nagelfluh-postgres
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/nagelfluh-data/postgres
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nagelfluh-minio
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/nagelfluh-data/minio
