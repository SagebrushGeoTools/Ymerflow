# The MinIO PV moved into plugins/ymerflow-minikube's own MinioProtocolHandler.bootstrap() (see
# docs/plans/minikube-provisioning-plugin.md) — Postgres is the only thing left here; MinIO is
# out of core's storage scope, same boundary app_deployment.py already draws.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nagelfluh-postgres
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/nagelfluh-data/postgres
