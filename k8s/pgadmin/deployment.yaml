apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: nagelfluh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        ports:
        - containerPort: 80
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          valueFrom:
            secretKeyRef:
              name: nagelfluh-admin-secret
              key: pgadmin-email
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nagelfluh-admin-secret
              key: admin-password
        - name: SCRIPT_NAME
          value: "/pgadmin"
        - name: PGADMIN_CONFIG_SERVER_MODE
          value: "True"
        volumeMounts:
        - name: servers
          mountPath: /pgadmin4/servers.json
          subPath: servers.json
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: servers
        configMap:
          name: pgadmin-servers
