apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: nagelfluh
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Nagelfluh",
          "Group": "Servers",
          "Host": "postgres.nagelfluh.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "nagelfluh",
          "Username": "nagelfluh",
          "SSLMode": "prefer"
        }
      }
    }
