---
# Role in nagelfluh-jobs namespace granting job/pod/log/event access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nagelfluh-backend-jobs
  namespace: nagelfluh-jobs
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update"]
---
# Bind the role to the default service account in the nagelfluh namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nagelfluh-backend-jobs
  namespace: nagelfluh-jobs
subjects:
- kind: ServiceAccount
  name: default
  namespace: nagelfluh
roleRef:
  kind: Role
  name: nagelfluh-backend-jobs
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole allowing the backend to read Kueue ClusterQueues (cluster-scoped resource)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nagelfluh-backend-kueue-reader
rules:
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["clusterqueues"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nagelfluh-backend-kueue-reader
subjects:
- kind: ServiceAccount
  name: default
  namespace: nagelfluh
roleRef:
  kind: ClusterRole
  name: nagelfluh-backend-kueue-reader
  apiGroup: rbac.authorization.k8s.io
